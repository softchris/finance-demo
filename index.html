<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Finance Tracker</h1>
      <button id="btn-dark-mode" class="btn-dark-mode" aria-label="Toggle dark mode">🌙 Dark Mode</button>
    </div>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="card balance">
        <h2>Balance</h2>
        <p id="balance">$0.00</p>
      </div>
      <div class="card income">
        <h2>Income</h2>
        <p id="total-income">$0.00</p>
      </div>
      <div class="card expense">
        <h2>Expenses</h2>
        <p id="total-expense">$0.00</p>
      </div>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-group">
          <label for="description">Description</label>
          <input
            type="text"
            id="description"
            placeholder="e.g. Groceries, Salary…"
            required
          />
        </div>
        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            placeholder="0.00"
            step="0.01"
            required
          />
        </div>
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="food">Food &amp; Dining</option>
            <option value="transport">Transport</option>
            <option value="housing">Housing</option>
            <option value="entertainment">Entertainment</option>
            <option value="health">Health</option>
            <option value="shopping">Shopping</option>
            <option value="salary">Salary</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required />
        </div>
        <button type="submit" class="btn-add">Add Transaction</button>
      </form>
    </div>

    <!-- Filter / Search -->
    <div class="filter-section">
      <h2>Transaction History</h2>
      <div class="filters">
        <input
          type="text"
          id="search"
          placeholder="Search transactions…"
        />
        <select id="filter-type">
          <option value="all">All</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select id="filter-category">
          <option value="all">All Categories</option>
          <option value="food">Food &amp; Dining</option>
          <option value="transport">Transport</option>
          <option value="housing">Housing</option>
          <option value="entertainment">Entertainment</option>
          <option value="health">Health</option>
          <option value="shopping">Shopping</option>
          <option value="salary">Salary</option>
          <option value="other">Other</option>
        </select>
        <button id="btn-clear-all" class="btn-clear-all">Clear All</button>
      </div>
    </div>

    <!-- Transaction List -->
    <ul id="transaction-list" class="transaction-list"></ul>

    <p id="empty-msg" class="empty-msg">No transactions yet. Add one above!</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
